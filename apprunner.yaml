version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - corepack enable
      - pnpm install
      - pnpm prisma generate
    build:
      - DATABASE_URL="postgresql://dummy:dummy@localhost:5432/dummy" pnpm build
run:
  command: HOSTNAME=0.0.0.0 node .next/standalone/server.js
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: production
