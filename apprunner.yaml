version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - npm install
      - npx prisma generate
    build:
      - DATABASE_URL="postgresql://dummy:dummy@localhost:5432/dummy" npx next build
      - mkdir -p .next/standalone/public && cp -r public/* .next/standalone/public/ || true
      - cp -r .next/static .next/standalone/.next/static || true
